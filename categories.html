<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Categories Dashboard</title>

<style>

body{
font-family:Arial,sans-serif;
max-width:1000px;
margin:30px auto;
padding:20px;
}

h1{
margin:0;
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.add-btn{
background:#28a745;
color:white;
padding:12px 20px;
text-decoration:none;
border-radius:5px;
font-weight:bold;
}

.count-box{
font-size:20px;
font-weight:bold;
margin-bottom:20px;
}

.category-card{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
margin-bottom:15px;
background:#f5f5f5;
border-radius:12px;
}

.category-info img{
width:100px;
height:100px;
object-fit:cover;
border-radius:10px;
display:block;
margin-bottom:10px;
}

.category-info h3{
margin:0;
}

.action-buttons{
display:flex;
gap:10px;
}

.upload-btn{
background:#007bff;
color:white;
border:none;
padding:10px 15px;
cursor:pointer;
border-radius:5px;
}

.delete-btn{
background:red;
color:white;
border:none;
padding:10px 15px;
cursor:pointer;
border-radius:5px;
}

</style>

</head>

<body>

<div class="top-bar">

<h1>Categories Dashboard</h1>

<a href="add-category.html"
class="add-btn">

* Add Category

</a>

</div>

<div
class="count-box"
id="categoryCount">

Loading...

</div>

<div id="categoriesList"></div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
deleteDoc,
doc,
updateDoc
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyD85FuEhRolVMpXTuu34LgDMRVaT_R3Fek",
authDomain: "samim-d6b27.firebaseapp.com",
projectId: "samim-d6b27",
storageBucket: "samim-d6b27.firebasestorage.app",
messagingSenderId: "147210923031",
appId: "1:147210923031:web:04f6a9f5649183d8b1c052"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const list =
document.getElementById("categoriesList");

const countBox =
document.getElementById("categoryCount");

async function loadCategories(){

list.innerHTML = "";

const snapshot =
await getDocs(
collection(db,"categories")
);

countBox.innerHTML =
`Total Categories: ${snapshot.size}`;

snapshot.forEach((categoryDoc)=>{

const category =
categoryDoc.data();

list.innerHTML += `

<div class="category-card">

<div class="category-info">

<img
src="${category.image || 'https://via.placeholder.com/100'}">

<h3>${category.name}</h3>

</div>

<div class="action-buttons">

<button
class="upload-btn"
data-id="${categoryDoc.id}">

Upload Image

</button>

<button
class="delete-btn"
data-id="${categoryDoc.id}">

Delete

</button>

</div>

</div>

`;

});

attachDeleteEvents();
attachUploadEvents();

}

function attachDeleteEvents(){

document
.querySelectorAll(".delete-btn")
.forEach(btn=>{

btn.addEventListener("click",
async ()=>{

const id =
btn.dataset.id;

if(!confirm("Delete Category?"))
return;

await deleteDoc(
doc(db,"categories",id)
);

loadCategories();

});

});

}

function attachUploadEvents(){

document
.querySelectorAll(".upload-btn")
.forEach(btn=>{

btn.addEventListener("click",
async ()=>{

const id =
btn.dataset.id;

const input =
document.createElement("input");

input.type = "file";
input.accept = "image/*";

input.click();

input.onchange = async ()=>{

const file =
input.files[0];

if(!file) return;

try{

const formData =
new FormData();

formData.append(
"file",
file
);

formData.append(
"upload_preset",
"plantersemporium"
);

const response =
await fetch(
"https://api.cloudinary.com/v1_1/da7pwkapr/image/upload",
{
method:"POST",
body:formData
}
);

const data =
await response.json();

await updateDoc(
doc(db,"categories",id),
{
image:data.secure_url
}
);

alert(
"Image Uploaded Successfully"
);

loadCategories();

}
catch(error){

console.log(error);
alert(error.message);

}

};

});

});

}

loadCategories();

</script>

</body>
</html>
