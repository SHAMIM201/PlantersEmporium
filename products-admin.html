<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>All Products</title>

<style>
body{
font-family:Arial,sans-serif;
padding:20px;
}

#products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}

.product{
border:1px solid #ddd;
padding:15px;
border-radius:10px;
text-align:center;
}

.product img{
width:100%;
height:220px;
object-fit:cover;
border-radius:8px;
}

button{
padding:10px 15px;
margin:5px;
border:none;
cursor:pointer;
border-radius:5px;
color:white;
}

.edit-btn{
background:#007bff;
}

.delete-btn{
background:#dc3545;
}
.button-group{
display:flex;
justify-content:center;
gap:8px;
margin-top:15px;
flex-wrap:wrap;
}

.button-group button{
min-width:90px;
font-weight:600;
}
</style>

</head>
<body>

<h1>All Products</h1>
<input
type="text"
id="searchInput"
placeholder="Search Product..."
style="
width:100%;
padding:12px;
margin:20px 0;
font-size:16px;
border:1px solid #ccc;
border-radius:8px;
">
<div id="products">
Loading Products...
</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
updateDoc,
deleteDoc,
getDoc
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
const firebaseConfig = {
apiKey: "AIzaSyD85FuEhRolVMpXTuu34LgDMRVaT_R3Fek",
authDomain: "samim-d6b27.firebaseapp.com",
projectId: "samim-d6b27",
storageBucket: "samim-d6b27.firebasestorage.app",
messagingSenderId: "147210923031",
appId: "1:147210923031:web:04f6a9f5649183d8b1c052"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

onAuthStateChanged(auth,(user)=>{

if(!user){

window.location.href = "admin.html";

}

});
async function loadProducts(){
    

const snapshot =
await getDocs(collection(db,"products"));
const searchText =
document.getElementById("searchInput")?.value
.toLowerCase() || "";

let output = "";

snapshot.forEach((docSnap)=>{

const p = docSnap.data();
if(
!p.name
.toLowerCase()
.includes(searchText)
){
return;
}

output += `
<div class="product">

<img src="${p.image}" alt="${p.name}">

<h3>${p.name}</h3>

<p><b>₹${p.price}</b></p>
<p>
📦 Stock:
<b>${p.stock || 0}</b>
</p>

<p>${p.category || ""}</p>
<p>⭐ Featured: ${p.featured ? "Yes" : "No"}</p>

<p>🔥 Best Seller: ${p.bestseller ? "Yes" : "No"}</p>
<div class="button-group">

<button
class="edit-btn"
onclick="editProduct('${docSnap.id}','${p.name}','${p.price}','${p.stock || 0}')">
Edit
</button>

<button
class="edit-btn"
onclick="changeImage('${docSnap.id}')">
Image
</button>

<button
class="delete-btn"
onclick="deleteProduct('${docSnap.id}')">
Delete
</button>

</div>
</div>
`;

});

document.getElementById("products").innerHTML =
output || "<h3>No Products Found</h3>";

}

window.editProduct = async function(id,name,price,stock){

const newName =
prompt("Enter New Product Name",name);

if(!newName) return;

const newPrice =
prompt("Enter New Product Price",price);

if(!newPrice) return;
const newStock =
prompt("Enter Product Stock",stock);

if(newStock === null) return;

await updateDoc(doc(db,"products",id),{
name:newName,
price:Number(newPrice),
stock:Number(newStock)
});

alert("Product Updated");

location.reload();

};

window.deleteProduct = async function(id){

const confirmDelete =
confirm("Delete this product?");

if(!confirmDelete) return;

await deleteDoc(doc(db,"products",id));

alert("Product Deleted");

location.reload();

};
window.changeImage = async function(id){

const input = document.createElement("input");

input.type = "file";

input.accept = "image/*";

input.onchange = async ()=>{

const file = input.files[0];

if(!file) return;

try{

const formData = new FormData();

formData.append("file", file);

formData.append(
"upload_preset",
"plantersemporium"
);

const response = await fetch(
"https://api.cloudinary.com/v1_1/da7pwkapr/image/upload",
{
method:"POST",
body:formData
}
);

const data = await response.json();

if(!data.secure_url){

alert("Upload Failed");
return;

}

await updateDoc(
doc(db,"products",id),
{
image:data.secure_url
}
);

alert("Image Updated Successfully");

location.reload();

}
catch(error){

console.error(error);

alert(error.message);

}

};

input.click();

};

loadProducts();

document
.getElementById("searchInput")
.addEventListener(
"input",
loadProducts
);

</script>

</body>
</html>
