<!DOCTYPE html>
<html>
<head>
<title>Order Successful</title>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="mobile.css">

</head>
<p id="order-number"></p>
<body>

<div class="success-box">

<h1>🎉 Order Placed Successfully</h1>

<p>
Thank you for choosing Planters Emporium.
</p>

<div class="success-buttons">

<a href="index.html" class="order-btn">
Continue Shopping
</a>

<a id="trackBtn"
href="#"
class="order-btn">
Track Order
</a>

<a id="whatsappBtn"
href="#"
class="order-btn">
WhatsApp Tracking
</a>

</div>
</div>
<script>
const orderNo =
localStorage.getItem("lastOrderNumber");

document.getElementById("order-number")
.innerText =
"Order ID : " + orderNo;
document.getElementById("trackBtn")
.href =
"track-order.html?order=" + orderNo;
const trackingLink =
window.location.origin +
"/track-order.html?order=" +
orderNo;

document.getElementById("whatsappBtn")
.href =
`https://wa.me/?text=📦 Order ID: ${orderNo}%0A%0A🔍 Track Order:%0A${trackingLink}`;

</script>


</body>
</html>
