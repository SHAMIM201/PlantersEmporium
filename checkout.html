
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Checkout</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1 style="text-align:center;">Checkout</h1>

<div class="checkout-form">

<input type="text" id="name" placeholder="Full Name" required>
<br><br>

<input type="tel" id="phone" placeholder="Mobile Number" required>
<br><br>

<input type="text" id="address" placeholder="Address" required>
<br><br>

<input type="text" id="city" placeholder="City" required>
<br><br>

<input type="text" id="pincode" placeholder="Pincode" required>
<br><br>

<h3>Select Payment Method</h3>

<label>
<input type="radio" name="payment" value="UPI Payment" checked>
UPI Payment
</label>

<br><br>

<label>
<input type="radio" name="payment" value="Credit / Debit Card">
Credit / Debit Card
</label>

<br><br>

<label>
<input type="radio" name="payment" value="Cash On Delivery">
Cash On Delivery
</label>

<br><br>
<div id="orderSummary"
style="
background:#f5f5f5;
padding:15px;
border-radius:10px;
margin-bottom:20px;">
</div>

<div style="
display:flex;
justify-content:center;
align-items:center;
gap:15px;
flex-wrap:nowrap;
">
<div class="checkout-buttons">

<button id="pay-btn" class="order-btn">
Place Order
</button>

<button onclick="sendWhatsAppOrder()" class="order-btn">
Order On WhatsApp
</button>

</div>
</div>
</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  doc,
  getDoc,
  updateDoc
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD85FuEhRolVMpXTuu34LgDMRVaT_R3Fek",
  authDomain: "samim-d6b27.firebaseapp.com",
  projectId: "samim-d6b27",
  storageBucket: "samim-d6b27.firebasestorage.app",
  messagingSenderId: "147210923031",
  appId: "1:147210923031:web:04f6a9f5649183d8b1c052"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const cart =
JSON.parse(localStorage.getItem("cart")) || [];

const summary =
document.getElementById("orderSummary");

let total = 0;

summary.innerHTML =
"<h3>Order Summary</h3>";

cart.forEach(item=>{

const qty = item.quantity || 1;
const itemTotal = item.price * qty;

total += itemTotal;

summary.innerHTML += `
<p>
${item.name}
× ${qty}
= ₹${itemTotal}
</p>
`;

});

summary.innerHTML += `
<hr>
<h3>Total: ₹${total}</h3>
`;

window.placeOrder = async function(){

try{

const name = document.getElementById("name").value.trim();
const phone = document.getElementById("phone").value.trim();
const address = document.getElementById("address").value.trim();
const city = document.getElementById("city").value.trim();
const pincode = document.getElementById("pincode").value.trim();

if(!name || !phone || !address || !city || !pincode){
alert("Please fill all fields");
return;
}

const paymentMethod =
document.querySelector(
'input[name="payment"]:checked'
).value;
const orderNumber =
"PE" + Date.now();

const order = {

  orderNumber,

name,
phone,
address,
city,
pincode,

paymentMethod,

totalAmount: total,

cart:
JSON.parse(localStorage.getItem("cart")) || [],

status:"Pending",

createdAt:new Date()

};
for(const item of order.cart){

const productRef =
doc(db,"products",item.id);

const productSnap =
await getDoc(productRef);

if(productSnap.exists()){

const product =
productSnap.data();

await updateDoc(
productRef,
{
stock:
Math.max(
0,
(product.stock || 0)
-
(item.quantity || 1)
)
}
);

}

}
await addDoc(
collection(db,"orders"),
order
);

localStorage.removeItem("cart");
localStorage.removeItem("cartCount");

alert(
"Order Placed Successfully\n\nOrder ID: " +
orderNumber
);

window.location.href = "success.html";

}
catch(error){

console.error(error);
alert(error.message);

}

};

window.sendWhatsAppOrder = function(){

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

let message =
"🌱 PLANTERS EMPORIUM ORDER%0A%0A";

message +=
"👤 Name: " +
document.getElementById("name").value +
"%0A";

message +=
"📞 Phone: " +
document.getElementById("phone").value +
"%0A";

message +=
"📍 Address: " +
document.getElementById("address").value +
", " +
document.getElementById("city").value +
" - " +
document.getElementById("pincode").value +
"%0A%0A";

message += "🛒 Order Details:%0A";

let total = 0;

cart.forEach(item=>{

let qty = item.quantity || 1;
let itemTotal = item.price * qty;

total += itemTotal;

message +=
`• ${item.name} x ${qty} = ₹${itemTotal}%0A`;

});

message +=
`%0A💰 Total Amount = ₹${total}%0A`;

window.open(
`https://wa.me/919810475303?text=${message}`,
"_blank"
);

};

document
.getElementById("pay-btn")
.addEventListener("click", placeOrder);

</script>

</body>
</html>
