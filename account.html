<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Account</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="mobile.css">

</head>
<body>

<div class="account-box">
<div id="authBox">
<h2>Login / Signup</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="signup()">Sign Up</button>

<button onclick="login()">Login</button>



<p id="userInfo"></p>

</div>
<div class="customer-upload-section">

    <h3>📸 Share Your Installation Photo</h3>

    <p>
        Upload your planter installation photo and get featured on our website.
    </p>

    <input
        type="file"
        id="customerPhoto"
        accept="image/*">

    <button id="uploadPhotoBtn">
        Upload Photo
    </button>

    <p id="uploadStatus"></p>

</div>
<button
id="logoutBtn"
onclick="logout()"
style="display:none;">
Logout
</button>

<script type="module" src="account.js"></script>

</body>
</html>
