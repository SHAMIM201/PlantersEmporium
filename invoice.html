<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GST Invoice</title>

<link rel="stylesheet" href="style.css">

<style>

body{
background:#f5f5f5;
margin:0;
padding:20px;
font-family:Arial,sans-serif;
}

.invoice-box{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.header{
display:flex;
justify-content:space-between;
align-items:flex-start;
margin-bottom:20px;
}

.company{
color:#0b7a29;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

table th,
table td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

.total-box{
margin-top:20px;
text-align:right;
}

.print-btn{
background:#0b7a29;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
margin-bottom:20px;
}

@media print{
.print-btn{
display:none;
}
body{
background:white;
}
}

</style>

</head>

<body>

<div class="invoice-box">

<button
class="print-btn"
onclick="window.print()">
Print / Save PDF
</button>

<div id="invoiceData">

Loading Invoice...

</div>

</div>

<script type="module" src="invoice.js"></script>

</body>
</html>
