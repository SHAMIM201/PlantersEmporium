<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wishlist - Planters Emporium</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
}

h1{
text-align:center;
color:#006400;
margin-bottom:30px;
}

#wishlist-container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}

.wishlist-card{
background:#fff;
border-radius:15px;
padding:15px;
text-align:center;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.wishlist-card img{
width:100%;
height:220px;
object-fit:cover;
border-radius:12px;
}

.wishlist-card h3{
margin:15px 0 10px;
}

.price{
font-size:22px;
font-weight:bold;
color:#006400;
}

.actions{
display:flex;
gap:10px;
justify-content:center;
margin-top:15px;
}

.remove-btn,
.cart-btn{
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.remove-btn{
background:#ff4d4d;
color:white;
}

.cart-btn{
background:#0a8f1f;
color:white;
}

.empty{
text-align:center;
font-size:20px;
margin-top:50px;
color:#666;
}
</style>
</head>

<body>

<h1>❤️ My Wishlist</h1>

<div id="wishlist-container"></div>

<script>

const container =
document.getElementById("wishlist-container");

function loadWishlist(){

const wishlist =
JSON.parse(localStorage.getItem("wishlist")) || [];

if(wishlist.length === 0){

container.innerHTML = `
<div class="empty">
No items in wishlist ❤️
</div>
`;

return;
}

container.innerHTML = "";

wishlist.forEach(product=>{

container.innerHTML += `

<div class="wishlist-card">

<img src="${product.image}" alt="${product.name}">

<h3>${product.name}</h3>

<p class="price">
₹${product.price}
</p>

<div class="actions">

<button
class="cart-btn"
onclick="addToCart(
'${product.id}',
'${product.name}',
${product.price},
'${product.image}'
)">
🛒 Add To Cart
</button>

<button
class="remove-btn"
onclick="removeWishlist('${product.id}')">
Remove
</button>

</div>

</div>

`;

});

}

function removeWishlist(id){

let wishlist =
JSON.parse(localStorage.getItem("wishlist")) || [];

wishlist =
wishlist.filter(item => item.id !== id);

localStorage.setItem(
"wishlist",
JSON.stringify(wishlist)
);

loadWishlist();

}

function addToCart(id,name,price,image){

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

const existing =
cart.find(item => item.id === id);

if(existing){

existing.quantity++;

}else{

cart.push({
id,
name,
price,
image,
quantity:1
});

}

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

alert("Added to Cart");

}

loadWishlist();

</script>

</body>
</html>
