
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shopping Cart</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1 style="text-align:center;margin-top:30px;">
Shopping Cart
</h1>

<div class="cart-container">

    <div id="cart-items"></div>

    <div class="cart-total">

        <h2>
            Total Products :
            <span id="total-products">0</span>
        </h2>

        <br>

        <button onclick="clearCart()" class="order-btn">
            Empty Cart
        </button>

        <br><br>

        <a href="checkout.html" class="order-btn">
            Proceed To Checkout
        </a>

    </div>

</div>


<script>

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

const cartItems =
document.getElementById("cart-items");

let totalProducts = cart.reduce(
(sum,item)=>sum + (item.quantity || 1),
0
);

document.getElementById("total-products")
.innerText = totalProducts;

if(cart.length === 0){

cartItems.innerHTML = `
<h2 style="text-align:center;">
Your Cart Is Empty
</h2>
`;

}

cart.forEach((product,index)=>{

cartItems.innerHTML += `

<div class="cart-item"
style="
border:1px solid #ddd;
padding:15px;
margin:15px;
border-radius:10px;
">

<img
src="${product.image}"
width="150"
style="
border-radius:10px;
display:block;
margin-bottom:10px;
">

<h2>${product.name}</h2>

<p>₹${product.price}</p>

<div style="margin:10px 0;">

<button onclick="changeQty(${index},-1)">
−
</button>

<span style="padding:0 15px;">
${product.quantity || 1}
</span>

<button onclick="changeQty(${index},1)">
+
</button>

</div>

<p>
Total : ₹${product.price * (product.quantity || 1)}
</p>

<button
onclick="removeItem(${index})"
class="order-btn">

Remove

</button>

</div>

`;



});

function removeItem(index){

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

cart.splice(index,1);

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

location.reload();

}
function changeQty(index,value){

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

cart[index].quantity =
(cart[index].quantity || 1) + value;

if(cart[index].quantity <= 0){
    cart.splice(index,1);
}

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

location.reload();

}
function clearCart(){

localStorage.removeItem("cart");

location.reload();

}
console.log(
JSON.parse(localStorage.getItem("cart"))
);
</script>

</body>
</html>
