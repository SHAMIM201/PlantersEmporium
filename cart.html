
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shopping Cart</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1 style="text-align:center;margin-top:30px;">
Shopping Cart
</h1>

<div class="cart-container">

    <div id="cart-items"></div>

    <div class="cart-total">

        <h2>
            Total Products :
            <span id="total-products">0</span>
        </h2>

        <br>

        <button onclick="clearCart()" class="order-btn">
            Empty Cart
        </button>

        <br><br>

        <a href="checkout.html" class="order-btn">
            Proceed To Checkout
        </a>

    </div>

</div>


<script type="module">
    import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getFirestore,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyD85FuEhRolVMpXTuu34LgDMRVaT_R3Fek",
authDomain: "samim-d6b27.firebaseapp.com",
projectId: "samim-d6b27",
storageBucket: "samim-d6b27.firebasestorage.app",
messagingSenderId: "147210923031",
appId: "1:147210923031:web:04f6a9f5649183d8b1c052"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

const cartItems =
document.getElementById("cart-items");

let totalProducts = cart.reduce(
(sum,item)=>sum + (item.quantity || 1),
0
);

document.getElementById("total-products")
.innerText = totalProducts;

if(cart.length === 0){

cartItems.innerHTML = `
<h2 style="text-align:center;">
Your Cart Is Empty
</h2>
`;

}

cart.forEach((product,index)=>{

cartItems.innerHTML += `

<div class="cart-item"
style="
border:1px solid #ddd;
padding:15px;
margin:15px;
border-radius:10px;
">

<img
src="${product.image}"
width="150"
style="
border-radius:10px;
display:block;
margin-bottom:10px;
">

<h2>${product.name}</h2>

<p>₹${product.price}</p>

<div style="margin:10px 0;">

<button onclick="changeQty(${index},-1)">
−
</button>

<span style="padding:0 15px;">
${product.quantity || 1}
</span>

<button onclick="changeQty(${index},1)">
+
</button>

</div>

<p>
Total : ₹${product.price * (product.quantity || 1)}
</p>

<button
onclick="removeItem(${index})"
class="order-btn">

Remove

</button>

</div>

`;



});

function removeItem(index){

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

cart.splice(index,1);

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

location.reload();

}

window.changeQty = async function(index,value){

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

const item = cart[index];

const productRef =
doc(db,"products",item.id);

const productSnap =
await getDoc(productRef);

if(!productSnap.exists()) return;

const stock =
productSnap.data().stock || 0;

const newQty =
(item.quantity || 1) + value;

if(newQty > stock){

alert(
`Only ${stock} items available`
);

return;

}

item.quantity = newQty;

if(item.quantity <= 0){

cart.splice(index,1);

}

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

location.reload();

};
function clearCart(){

localStorage.removeItem("cart");

location.reload();

}
console.log(
JSON.parse(localStorage.getItem("cart"))
);
</script>

</body>
</html>
