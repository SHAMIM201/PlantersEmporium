<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Add Category</title>

<style>

body{
font-family:Arial,sans-serif;
max-width:600px;
margin:40px auto;
padding:20px;
}

h1{
text-align:center;
}

input,button{
width:100%;
padding:12px;
margin-top:15px;
box-sizing:border-box;
}

button{
background:#28a745;
color:#fff;
border:none;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#218838;
}

</style>

</head>
<body>

<h1>Add Category</h1>

<input
type="text"
id="categoryName"
placeholder="Category Name">
<input
type="file"
id="categoryImage"
accept="image/*">

<button onclick="addCategory()">
Add Category
</button>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyD85FuEhRolVMpXTuu34LgDMRVaT_R3Fek",
authDomain: "samim-d6b27.firebaseapp.com",
projectId: "samim-d6b27",
storageBucket: "samim-d6b27.firebasestorage.app",
messagingSenderId: "147210923031",
appId: "1:147210923031:web:04f6a9f5649183d8b1c052"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.addCategory = async function(){

const name =
document.getElementById("categoryName")
.value.trim();

if(!name){

alert("Enter Category Name");
return;

}

try{

await addDoc(
collection(db,"categories"),
{
name:name,
createdAt:new Date()
}
);

alert("Category Added");

document.getElementById(
"categoryName"
).value="";

}catch(error){

console.log(error);
alert(error.message);

}

};

</script>

</body>
</html>
