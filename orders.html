<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orders Dashboard</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    padding:20px;
}

h1{
    margin-bottom:10px;
}

#searchPhone{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    margin-bottom:20px;
    font-size:16px;
}

.order{
    background:#fff;
    border:1px solid #ddd;
    border-radius:10px;
    padding:15px;
    margin-bottom:15px;
}

.order h3{
    margin-top:0;
}

button{
    padding:8px 12px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    margin-top:10px;
}

.delete-btn{
    background:#f44336;
    color:white;
}
.view-btn{
    background:#2196f3;
    color:white;
}

.print-btn{
    background:#4caf50;
    color:white;
}

select{
    padding:6px;
    margin-top:10px;
}
</style>
</head>
<body>

<h1>Customer Orders</h1>

<input
type="text"
id="searchPhone"
placeholder="Search by Name or Phone Number"
>

<h3>Total Orders: <span id="totalOrders">0</span></h3>

<div id="orders"></div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
    getFirestore,
    collection,
    getDocs,
    doc,
    updateDoc,
    deleteDoc,
    getDoc
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyD85FuEhRolVMpXTuu34LgDMRVaT_R3Fek",
    authDomain: "samim-d6b27.firebaseapp.com",
    projectId: "samim-d6b27",
    storageBucket: "samim-d6b27.firebasestorage.app",
    messagingSenderId: "147210923031",
    appId: "1:147210923031:web:04f6a9f5649183d8b1c052"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
console.log("Firebase Connected");
window.showItems = async function(id){

try{

const orderRef = doc(db,"orders",id);
const orderSnap = await getDoc(orderRef);

if(!orderSnap.exists()){
alert("Order not found");
return;
}

const order = orderSnap.data();

let text = "ORDER ITEMS\n\n";

if(order.cart){

order.cart.forEach(item=>{

text +=
item.name +
"\nQty: " + item.quantity +
"\nPrice: ₹" + item.price +
"\n\n";

});

}

alert(text);

}catch(error){

console.error(error);
alert("Failed to load items");

}

};

window.printInvoice = async function(id){

try{

const orderRef = doc(db,"orders",id);
const orderSnap = await getDoc(orderRef);

if(!orderSnap.exists()){
alert("Order not found");
return;
}

const order = orderSnap.data();

let itemsHtml = "";

if(order.cart){

order.cart.forEach(item=>{

itemsHtml += `
<tr>
<td>${item.name}</td>
<td>${item.quantity}</td>
<td>₹${item.price}</td>
<td>₹${item.price * item.quantity}</td>
</tr>
`;

});

}

const win = window.open("","_blank");

win.document.write(`
<html>
<head>
<title>Invoice</title>
</head>
<body>

<h2>Planters Emporium Invoice</h2>

<p><b>Name:</b> ${order.name}</p>
<p><b>Phone:</b> ${order.phone}</p>
<p><b>Address:</b> ${order.address}</p>

<table border="1" cellpadding="8">
<tr>
<th>Product</th>
<th>Qty</th>
<th>Price</th>
<th>Total</th>
</tr>

${itemsHtml}

</table>

</body>
</html>
`);

win.document.close();

setTimeout(()=>{
win.print();
},500);

}catch(error){

console.error(error);
alert("Invoice print failed");

}

};
window.updateStatus = async function(id,status){
console.log("Status Change");
console.log(id);
console.log(status);
try{

const orderRef =
doc(db,"orders",id);

const orderSnap =
await getDoc(orderRef);

const order =
orderSnap.data();
console.log("ORDER DATA");
console.log(order);
console.log(order.cart);


const oldStatus =
order.status || "Pending";
if(
status === "Cancelled" &&
oldStatus !== "Cancelled"
){

for(const item of order.cart){

const productRef =
doc(db,"products",item.id);

const productSnap =
await getDoc(productRef);

if(productSnap.exists()){

const product =
productSnap.data();

await updateDoc(
productRef,
{
stock:
(product.stock || 0)
+
(item.quantity || 1)
}
);

}

}

}

await updateDoc(orderRef,{
status:status
});

alert(
"Old Status: " + oldStatus +
"\nNew Status: " + status
);

loadOrders();

await updateDoc(orderRef,{
status:status
});

alert(
"Old Status: " + oldStatus +
"\nNew Status: " + status
);

loadOrders();

}catch(error){

console.error(error);
alert("Status update failed");

}

};


window.deleteOrder = async function(id){

if(!confirm("Delete this order?")) return;

try{

await deleteDoc(
doc(db,"orders",id)
);

loadOrders();

}
catch(error){

console.error(error);
alert("Delete failed");

}

};

async function loadOrders(){
    console.log("loadOrders running");

const ordersDiv = document.getElementById("orders");

ordersDiv.innerHTML = "Loading Orders...";

try{

const snapshot = 
await getDocs(collection(db,"orders"));
console.log("Orders Found:", snapshot.size);

const search =
document.getElementById("searchPhone")
.value
.toLowerCase();

document.getElementById("totalOrders").innerText =
snapshot.size;

ordersDiv.innerHTML = "";

snapshot.forEach((docSnap)=>{

const order = docSnap.data();

if(
search &&
!(
String(order.phone || "").includes(search) ||
String(order.name || "").toLowerCase().includes(search)
)
){
return;
}

ordersDiv.innerHTML += `
<div class="order">

<h3>${order.name || "No Name"}</h3>

<p><b>Phone:</b> ${order.phone || ""}</p>
<p><b>Address:</b> ${order.address || ""}</p>
<p><b>City:</b> ${order.city || ""}</p>
<p><b>Pincode:</b> ${order.pincode || ""}</p>
<p><b>Status:</b> ${order.status || "Pending"}</p>

<select onchange="updateStatus('${docSnap.id}',this.value)">
<option value="Pending" ${(order.status==="Pending")?"selected":""}>Pending</option>
<option value="Confirmed" ${(order.status==="Confirmed")?"selected":""}>Confirmed</option>
<option value="Shipped" ${(order.status==="Shipped")?"selected":""}>Shipped</option>
<option value="Delivered" ${(order.status==="Delivered")?"selected":""}>Delivered</option>
<option value="Cancelled" ${(order.status==="Cancelled")?"selected":""}>Cancelled</option>
</select>

<br><br>

<button class="view-btn" onclick="showItems('${docSnap.id}')">
View Items
</button>

<button class="print-btn" onclick="printInvoice('${docSnap.id}')">
Print Invoice
</button>

<button class="delete-btn" onclick="deleteOrder('${docSnap.id}')">
Delete Order
</button>

</div>
`;

});


}catch(error){

console.error(error);
alert("Status update failed");

}

};
loadOrders();

document
.getElementById("searchPhone")
.addEventListener("input",loadOrders);
</script>

</body>
</html>
